name: Build RecoilCrosshair

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: mingw-w64-x86_64-gcc

    - name: Build
      shell: msys2 {0}
      run: |
        g++ -O2 -mwindows -o RecoilCrosshair.exe crosshair.cpp \
            -lgdi32 -lwinmm -lshell32 -luser32

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: RecoilCrosshair
        path: RecoilCrosshair.exe

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: RecoilCrosshair.exe
